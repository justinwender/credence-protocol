[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
evm_version = "shanghai"
gas_reports = ["*"]

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
]

[rpc_endpoints]
bsc_testnet = "${BSC_TESTNET_RPC}"

# Etherscan V2 unified API: one key across all chains. chain 97 = BSC testnet.
# Forge resolves this via the `chain` field and routes to the V2 endpoint.
[etherscan]
bsc_testnet = { key = "${ETHERSCAN_API_KEY}", chain = 97 }
